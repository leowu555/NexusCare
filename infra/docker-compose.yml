# NexusCare-Sim local infrastructure
# Start:  docker compose -f infra/docker-compose.yml up -d
# Stop:   docker compose -f infra/docker-compose.yml down
# Logs:   docker compose -f infra/docker-compose.yml logs -f

name: nexuscare

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nexuscare}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nexuscare}
      POSTGRES_DB: ${POSTGRES_DB:-nexuscare}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nexuscare} -d ${POSTGRES_DB:-nexuscare}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.13.2
    ports:
      - "6333:6333" # REST + dashboard
      - "6334:6334" # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    ports:
      - "8123:8123" # HTTP
      - "9000:9000" # native TCP
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-nexuscare}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-nexuscare}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-nexuscare}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8123/ping | grep -q Ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data:
  qdrant_data:
  clickhouse_data:
